name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake and NDK
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;25.2.9519653"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug and release
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace
